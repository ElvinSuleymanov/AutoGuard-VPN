services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    hostname: unbound
    volumes:
      - ./unbound:/opt/unbound/etc/unbound/
    networks:
      private_network:
        ipv4_address: ${IP_UNBOUND}
    env_file:
      - .env

  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    depends_on:
      - unbound
      - pihole
    ports:
      - "${WIREGUARD_PUBLIC_PORT}/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    volumes:
      - ./config:/config
    env_file:
      - .env

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    depends_on:
      - unbound
    ports:
      - "65231:80/tcp"
    hostname: pihole
    dns:
      - 127.0.0.1
      - ${IP_UNBOUND}
    volumes:
      - ./etc-pihole/:/etc/pihole/
      - ./etc-dnsmasq.d/:/etc/dnsmasq.d/
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      private_network:
        ipv4_address: ${IP_PIHOLE}
    env_file:
      - .env
    environment:
      TZ: ${TIMEZONE}
      WEBPASSWORD: ${WEB_PASSWORD}
      PIHOLE_DNS_: "${IP_UNBOUND}#5053"