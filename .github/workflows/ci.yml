name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck setup.sh

      - name: Dockerfile Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./auth/Dockerfile.auth

      - name: Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  integration-test:
    needs: lint-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Start Stack
        run: |
          chmod +x setup.sh
          ./setup.sh <<EOF
          y
          EOF


  typecheck:
    name: Mypy type checking
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, sidecar]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + mypy
        run: |
          pip install mypy \
            fastapi pydantic requests \
            types-requests
          # Install the service's own deps so mypy can resolve imports
          pip install -r ./${{ matrix.service }}/requirements.txt

      - name: Mypy — ${{ matrix.service }}
        run: |
          mypy ./${{ matrix.service }}/ \
            --strict \
            --ignore-missing-imports \
            --exclude 'Dockerfile*'

  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, sidecar]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Bandit — ${{ matrix.service }}
        run: |
          bandit -r ./${{ matrix.service }}/ \
            -ll -ii \
            --exclude './${{ matrix.service }}/tests'

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/fastapi
            p/secrets
            p/docker
        env:
          SEMGREP_TIMEOUT: "300"

